<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Voice to Text Test</title>
  </head>
  <body>
    <div id="app">
      <header class="app-header">
        <h1>Voice Dictation</h1>
        <p class="subtitle">Test your device microphone</p>
      </header>

      <main class="content-area">
        <div class="transcript-card">
          <p id="transcript-text" class="placeholder">Your speech will appear here...</p>
        </div>
        <p id="status-message" class="status-idle">Tap mic to start</p>
      </main>

      <footer class="controls">
        <button id="mic-btn" class="mic-btn" aria-label="Toggle Microphone">
          <svg class="mic-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
            <line x1="12" y1="19" x2="12" y2="22"></line>
          </svg>
        </button>
      </footer>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
